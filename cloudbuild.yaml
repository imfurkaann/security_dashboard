steps:
  # Backend build ve push
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/security-backend:$COMMIT_SHA",
        "./backend",
      ]
    id: "build-backend"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/security-backend:$COMMIT_SHA"]
    id: "push-backend"
    waitFor: ["build-backend"]

  # Frontend build ve push
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "VITE_API_URL=${_API_URL}"
      - "-t"
      - "gcr.io/$PROJECT_ID/security-frontend:$COMMIT_SHA"
      - "./frontend"
    id: "build-frontend"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/security-frontend:$COMMIT_SHA"]
    id: "push-frontend"
    waitFor: ["build-frontend"]

  # Backend deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "security-backend"
      - "--image=gcr.io/$PROJECT_ID/security-backend:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--set-env-vars=NODE_ENV=production,DB_HOST=${_DB_HOST},DB_PORT=${_DB_PORT},DB_NAME=${_DB_NAME},DB_USER=${_DB_USER}"
      - "--set-secrets=DB_PASSWORD=db-password:latest,JWT_SECRET=jwt-secret:latest"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--port=5000"
    id: "deploy-backend"
    waitFor: ["push-backend"]

  # Frontend deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "security-frontend"
      - "--image=gcr.io/$PROJECT_ID/security-frontend:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=5"
      - "--port=80"
    id: "deploy-frontend"
    waitFor: ["push-frontend"]

substitutions:
  _REGION: "europe-west1"
  _API_URL: "https://security-backend-xxxxx-ew.a.run.app/api"
  _DB_HOST: "/cloudsql/PROJECT:REGION:INSTANCE"
  _DB_PORT: "5432"
  _DB_NAME: "security_management"
  _DB_USER: "postgres"

images:
  - "gcr.io/$PROJECT_ID/security-backend:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/security-frontend:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
