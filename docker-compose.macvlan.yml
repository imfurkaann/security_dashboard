###############################################################################
# MACVLAN DOCKER COMPOSE - AYRI IP ADRESİ İLE İZOLE SİSTEM
###############################################################################
# Bu docker-compose dosyası:
# 1. Container'lara otel ağından AYRI IP adresi verir
# 2. Host bilgisayarın IP'si ile ÇAKIŞMAZ
# 3. Kameralar ve diğer sistemlerle tamamen izole çalışır
###############################################################################
#
# KULLANIM ÖNCESİ YAPILANDIRMA GEREKLİ:
# 1. Otel ağınızın subnet'ini belirleyin (örn: 192.168.1.0/24)
# 2. Kullanılmayan bir IP adresi seçin (örn: 192.168.1.200)
# 3. Gateway adresini öğrenin (örn: 192.168.1.1)
# 4. Ağ arayüzünüzün adını öğrenin (örn: Ethernet, Wi-Fi)
#
# NOT: Windows'ta macvlan sınırlı desteklenir. Linux'ta tam çalışır.
# Windows için "ipvlan" veya port-based çözüm önerilir.
#
###############################################################################

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: security_db_macvlan
    hostname: security-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-security_management}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    volumes:
      - security_postgres_macvlan:/var/lib/postgresql/data
    # Port mapping yok - doğrudan IP üzerinden erişim
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-security_management}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      security_macvlan:
        ipv4_address: ${SYSTEM_IP:-192.168.1.200}

  # Backend API
  backend:
    image: security-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security_backend_macvlan
    hostname: security-backend
    user: root
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: ${SYSTEM_IP:-192.168.1.200}
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-security_management}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      TZ: Europe/Istanbul
      CORS_ORIGIN: "*"
    volumes:
      - ./backend/reports:/app/reports
      - ./backend/sgk_kayitlari:/app/sgk_kayitlari
      - ./database/migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      security_macvlan:
        ipv4_address: ${SYSTEM_IP:-192.168.1.200}

  # Frontend - Aynı IP'de farklı port yerine, tüm servisler tek IP'de
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://${SYSTEM_IP:-192.168.1.200}:5000/api
    container_name: security_frontend_macvlan
    hostname: security-frontend
    restart: unless-stopped
    environment:
      TZ: Europe/Istanbul
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      security_macvlan:
        ipv4_address: ${SYSTEM_IP:-192.168.1.200}

volumes:
  security_postgres_macvlan:
    driver: local
    name: security_postgres_macvlan_data

# MACVLAN Network - Gerçek ağdan IP alır
# NOT: Bu network'ü kullanmadan önce aşağıdaki komutu çalıştırın:
#
# docker network create -d macvlan \
#   --subnet=192.168.1.0/24 \
#   --gateway=192.168.1.1 \
#   -o parent=Ethernet \
#   security_macvlan
#
networks:
  security_macvlan:
    external: true
    name: security_macvlan
