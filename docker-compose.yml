services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: security_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-security_management}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/local_backup.sql:/docker-entrypoint-initdb.d/01-backup.sql:ro
      - ./database/migrations/012_create_sgk_records.sql:/docker-entrypoint-initdb.d/02-sgk.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-security_management}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - security_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security_backend
    user: root  # İzin hatasını kesin çözmek için geçici olarak root yetkisi ekledik
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_PORT: 80
      PUBLIC_HOST_IP: ${PUBLIC_HOST_IP:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-security_management}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      TZ: Europe/Istanbul
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      WHATSAPP_SESSION_PATH: ${WHATSAPP_SESSION_PATH:-.baileys_auth}
      WHATSAPP_CONNECT_TIMEOUT_MS: ${WHATSAPP_CONNECT_TIMEOUT_MS:-30000}
      WHATSAPP_LOG_LEVEL: ${WHATSAPP_LOG_LEVEL:-silent}
    volumes:
      - ./backend/reports:/app/reports # Raporların silinmemesi için local klasöre bağladık
      - ./backend/sgk_kayitlari:/app/sgk_kayitlari # SGK dosyalarının silinmemesi için local klasöre bağladık
      - whatsapp_auth:/app/.baileys_auth # WhatsApp oturum dosyalarının update/restart sonrası korunması
      # Migration dosyaları - backend başlarken otomatik çalıştırılır
      - ./database/migrations:/app/migrations:ro
      - ./ERISIM_BILGILERI.txt:/app/ERISIM_BILGILERI.txt:ro
      # Çıkış yaparken günlük export klasörü - Masaüstüne kayıt
     # - ${USERPROFILE}/Desktop/Guvenlik_Kayitlari:/app/daily_exports
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - security_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: security_frontend
    restart: unless-stopped
    environment:
      TZ: Europe/Istanbul
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - security_network

volumes:
  postgres_data:
    driver: local
    # VERİTABANI KORUMASI: Bu volume silinirse tüm veriler kaybolur!
    # ASLA "docker compose down -v" kullanmayın!
    # ASLA "docker volume rm security_postgres_data" kullanmayın!
    name: security_postgres_data
    labels:
      - "com.security.backup=required"
      - "com.security.critical=true"
      - "com.security.description=Güvenlik sistemi ana veritabanı - SİLMEYİN!"
  whatsapp_auth:
    driver: local
    name: security_whatsapp_auth
    labels:
      - "com.security.backup=recommended"
      - "com.security.description=Baileys WhatsApp auth session - SİLMEYİN!"

networks:
  security_network:
    driver: bridge