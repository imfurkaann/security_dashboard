###############################################################################
# AĞDA PAYLAŞIMLI DOCKER COMPOSE - Mevcut Verileri Koruyarak Çalıştırma
###############################################################################
# Bu docker-compose dosyası:
# 1. Mevcut veritabanı verilerini KORUR (silmez, yeni veri yüklemez)
# 2. Aynı WiFi ağındaki tüm cihazlardan erişime izin verir
# 3. local_backup.sql dosyasını YÜKLEMEz
###############################################################################

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: security_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-security_management}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    volumes:
      # Sadece named volume - yerel SQL dosyaları YÜKLENMİYOR
      # Bu sayede mevcut veriler korunur
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Tüm ağ arayüzlerinden erişime açık (0.0.0.0)
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-security_management}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - security_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security_backend
    user: root
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-security_management}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      TZ: Europe/Istanbul
      # CORS için tüm ağdan erişime izin ver
      CORS_ORIGIN: "*"
    volumes:
      - ./backend/reports:/app/reports
      - ./backend/sgk_kayitlari:/app/sgk_kayitlari
      # Migration dosyaları - backend başlarken otomatik çalıştırılır
      - ./database/migrations:/app/migrations:ro
    ports:
      # Tüm ağ arayüzlerinden erişime açık (0.0.0.0)
      - "0.0.0.0:5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - security_network

  # Frontend - Ağ IP adresi ile çalışacak şekilde yapılandırıldı
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # HOST_IP environment variable'dan alınacak
        # Çalıştırırken: HOST_IP=192.168.1.x docker compose up
        VITE_API_URL: ${VITE_API_URL:-http://${HOST_IP:-localhost}:5000/api}
    container_name: security_frontend
    restart: unless-stopped
    environment:
      TZ: Europe/Istanbul
    ports:
      # Tüm ağ arayüzlerinden erişime açık (0.0.0.0)
      - "0.0.0.0:80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - security_network

volumes:
  postgres_data:
    # external: true yaparsak mevcut volume'u kullanır
    # İlk kurulumda volume yoksa hata verir, bu yüzden driver: local kullanıyoruz
    driver: local

networks:
  security_network:
    driver: bridge
