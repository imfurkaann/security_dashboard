###############################################################################
# İZOLE DOCKER COMPOSE - OTEL KAMERA VE SİSTEMLERİYLE ÇAKIŞMAYAN YAPILANDIRMA
###############################################################################
# Bu docker-compose dosyası:
# 1. Tamamen izole bir Docker network kullanır (172.28.0.0/16)
# 2. Otel sistemleriyle çakışmayacak portlar kullanır (8088, 8089, 5433)
# 3. Mevcut IP kameralar ve diğer sistemlere zarar vermez
# 4. Host bilgisayarda sadece belirtilen portlardan erişim sağlar
###############################################################################
#
# KULLANILAN PORTLAR (Otel sistemleriyle çakışmayacak şekilde seçildi):
# - 8088: Frontend (Web Arayüzü) - Standart 80/443/8080 yerine
# - 8089: Backend API - Standart 5000/3000/8000 yerine  
# - 5433: PostgreSQL - Standart 5432 yerine
#
# İZOLE NETWORK: 172.28.0.0/16
# - Bu network sadece Docker içinde kullanılır
# - Otel LAN'ı ile hiçbir şekilde çakışmaz
# - Container'lar sadece belirtilen portlardan dış dünyaya açılır
#
###############################################################################

services:
  # PostgreSQL Database - İzole
  postgres:
    image: postgres:17-alpine
    container_name: security_db_isolated
    hostname: security-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-security_management}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    volumes:
      # Named volume - izole isim ile
      - security_postgres_isolated:/var/lib/postgresql/data
    ports:
      # Tüm ağdan erişime açık - Port 5433 (standart 5432 ile çakışmaz)
      - "0.0.0.0:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-security_management}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      security_isolated_network:
        ipv4_address: 172.28.1.10

  # Backend API - İzole
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security_backend_isolated
    hostname: security-backend
    user: root
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      # Docker network içinde postgres'e bağlanır
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-security_management}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      TZ: Europe/Istanbul
      # CORS ayarları
      CORS_ORIGIN: "*"
    volumes:
      - ./backend/reports:/app/reports
      - ./backend/sgk_kayitlari:/app/sgk_kayitlari
      - ./database/migrations:/app/migrations:ro
    ports:
      # Tüm ağ arayüzlerinden erişim - Port 8089 (standart portlarla çakışmaz)
      - "0.0.0.0:8089:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      security_isolated_network:
        ipv4_address: 172.28.1.20

  # Frontend - İzole
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # HOST_IP ve PORT dışarıdan gelir
        VITE_API_URL: ${VITE_API_URL:-http://${HOST_IP:-localhost}:8089/api}
    container_name: security_frontend_isolated
    hostname: security-frontend
    restart: unless-stopped
    environment:
      TZ: Europe/Istanbul
    ports:
      # Tüm ağ arayüzlerinden erişim - Port 8088 (80/8080 ile çakışmaz)
      - "0.0.0.0:8088:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      security_isolated_network:
        ipv4_address: 172.28.1.30

# İzole Volumes - Mevcut volume'larla çakışmaz
volumes:
  security_postgres_isolated:
    driver: local
    name: security_postgres_isolated_data

# İzole Network - 172.28.0.0/16 bloğu
# Bu blok genelde otel LAN'larında kullanılmaz (kameralar genelde 192.168.x.x veya 10.x.x.x)
networks:
  security_isolated_network:
    driver: bridge
    name: security_isolated_net
    ipam:
      driver: default
      config:
        # Özel bir subnet - otel sistemleriyle çakışmayacak
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
          ip_range: 172.28.1.0/24
    driver_opts:
      com.docker.network.bridge.name: br-security
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
